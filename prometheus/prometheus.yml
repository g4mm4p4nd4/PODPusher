global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8000

  - job_name: trend_ingestion
    metrics_path: /metrics
    static_configs:
      - targets:
          - trend_ingestion:8007
