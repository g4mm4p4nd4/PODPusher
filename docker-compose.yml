x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://user:pass@db:5432/pod}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  PLAYWRIGHT_PROXY: ${PLAYWRIGHT_PROXY:-}
  SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-6}
  TREND_INGESTION_STUB: ${TREND_INGESTION_STUB:-0}
  TREND_INGESTION_SCRAPEGRAPH: ${TREND_INGESTION_SCRAPEGRAPH:-1}
  TREND_INGESTION_RSS_FALLBACK: ${TREND_INGESTION_RSS_FALLBACK:-1}
  TREND_INGESTION_ALLOW_STUB_FALLBACK: ${TREND_INGESTION_ALLOW_STUB_FALLBACK:-1}
  TREND_INGESTION_TOP_K: ${TREND_INGESTION_TOP_K:-5}
  TREND_INGESTION_TIMEOUT_MS: ${TREND_INGESTION_TIMEOUT_MS:-15000}
  TREND_INGESTION_MAX_SOURCE_URLS: ${TREND_INGESTION_MAX_SOURCE_URLS:-2}
  SCRAPEGRAPH_MODEL: ${SCRAPEGRAPH_MODEL:-ollama/llama3.2}
  SCRAPEGRAPH_TIMEOUT_SECONDS: ${SCRAPEGRAPH_TIMEOUT_SECONDS:-45}
  SCRAPEGRAPH_OPENAI_BASE_URL: ${SCRAPEGRAPH_OPENAI_BASE_URL:-}
  SCRAPEGRAPH_API_KEY: ${SCRAPEGRAPH_API_KEY:-}
  OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
  OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
  OPENCODE_GO_BASE_URL: ${OPENCODE_GO_BASE_URL:-https://opencode.ai/zen/go/v1}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  SCRAPEGRAPHAI_TELEMETRY_ENABLED: ${SCRAPEGRAPHAI_TELEMETRY_ENABLED:-false}
  BILLING_STUB_MODE: ${BILLING_STUB_MODE:-false}
  OPENAI_USE_STUB: ${OPENAI_USE_STUB:-0}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  PRINTIFY_CLIENT_ID: ${PRINTIFY_CLIENT_ID:-}
  PRINTIFY_CLIENT_SECRET: ${PRINTIFY_CLIENT_SECRET:-}
  PRINTIFY_API_KEY: ${PRINTIFY_API_KEY:-}
  PRINTIFY_SHOP_ID: ${PRINTIFY_SHOP_ID:-}
  ETSY_CLIENT_ID: ${ETSY_CLIENT_ID:-}
  ETSY_CLIENT_SECRET: ${ETSY_CLIENT_SECRET:-}
  ETSY_ACCESS_TOKEN: ${ETSY_ACCESS_TOKEN:-}
  ETSY_SHOP_ID: ${ETSY_SHOP_ID:-}
  STRIPE_CLIENT_ID: ${STRIPE_CLIENT_ID:-}
  STRIPE_CLIENT_SECRET: ${STRIPE_CLIENT_SECRET:-}

x-backend-service: &backend-service
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    <<: *backend-env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: pod
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pod"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: pull llama3.2
    depends_on:
      - ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: "no"

  migrate:
    <<: *backend-service
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  gateway:
    <<: *backend-service
    command: uvicorn services.gateway.api:app --port 8000 --host 0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      ollama:
        condition: service_started

  trend_ingestion:
    <<: *backend-service
    command: uvicorn services.trend_ingestion.api:app --port 8007 --host 0.0.0.0
    ports:
      - "8007:8007"
    depends_on:
      migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_started

  worker:
    <<: *backend-service
    command: celery -A services.tasks worker -B -l info
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./client:/app
      - frontend-node-modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    command: sh -c "npm ci && npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - gateway
      - trend_ingestion

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  ollama-data:
  frontend-node-modules:
  prometheus-data:
  grafana-data:
